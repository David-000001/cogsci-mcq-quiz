.big{font-size:40px;font-weight:800;color:var(--brand);}

<script>
const DATA = [{"topic":"W1 · Intro to Cognitive Science","q":"Cognitive science is best defined as the interdisciplinary study of:","options":["Computer hardware design","The mind and intelligence","Statistics and probability","Human anatomy only"],"answer":1,"explain":"Cognitive science is the interdisciplinary study of the mind and intelligence — essentially how humans think and what makes them intelligent."},{"topic":"W1 · Intro to Cognitive Science","q":"Which of the following is NOT one of the disciplines that contribute to cognitive science?","options":["Linguistics","Neuroscience","Astronomy","Philosophy"],"answer":2,"explain":"Cognitive science draws on psychology, neuroscience, linguistics, philosophy, anthropology, education and computer science/AI — not astronomy."},{"topic":"W1 · Intro to Cognitive Science","q":"The 'magical number seven', proposed by George Miller, refers to:","options":["The number of senses humans have","The approximate limit of items held in short-term memory","The number of AI disciplines","The number of brain lobes"],"answer":1,"explain":"George Miller found humans can hold only a small amount of information at once — about 7 items in short-term memory."},{"topic":"W1 · Intro to Cognitive Science","q":"In which year and at which conference was the term 'Artificial Intelligence' first coined?","options":["1950, Cambridge","1956, Dartmouth","1961, MIT","1997, IBM"],"answer":1,"explain":"The term 'Artificial Intelligence' was first coined at the Dartmouth Conference in 1956."},{"topic":"W1 · Intro to Cognitive Science","q":"John McCarthy defined AI as:","options":["The study of human emotion","The science and engineering of making intelligent machines","A branch of pure mathematics","The replication of the human genome"],"answer":1,"explain":"McCarthy described AI as 'the science and engineering of making intelligent machines.'"},{"topic":"W1 · Intro to Cognitive Science","q":"The Turing Test (1950) is designed to assess whether:","options":["A computer can beat a human at chess","A judge can distinguish a machine's responses from a human's","A robot can walk unaided","An algorithm can compress data"],"answer":1,"explain":"In the Turing Test, a human judge tries to determine whether responses come from a human or a machine."},{"topic":"W1 · Intro to Cognitive Science","q":"The 'blind men and the elephant' analogy is used to illustrate that:","options":["Only neuroscientists are correct about the mind","Different disciplines reach different but individually valid conclusions about the same thing","Perception is always accurate","The mind cannot be studied"],"answer":1,"explain":"Each blind man touches a different part and reaches a different valid conclusion — like different research domains examining the mind. Cooperation across fields is needed."},{"topic":"W1 · Intro to Cognitive Science","q":"In the lecturer's mental model, if the mind is the 'program', then the brain is the:","options":["Loss function","Hardware / facility","Output layer","Training data"],"answer":1,"explain":"The lecturer framed the mind as the program/algorithm and the brain as the hardware/facility (like a GPU) that runs it."},{"topic":"W1 · Intro to Cognitive Science","q":"The 'AI winter' occurred mainly because:","options":["Researchers lost interest in mathematics","Hardware limitations meant AI could not meet expectations","Governments banned AI research","Neural networks were declared illegal"],"answer":1,"explain":"Expectations far exceeded what the limited hardware of the time (no GPUs, no cloud) could deliver, so funding and interest faded."},{"topic":"W1 · Intro to Cognitive Science","q":"Microsoft's chatbot 'Tay' (2016) is cited as an example of:","options":["A successful expert system","How an AI without guardrails can quickly become harmful","The first industrial robot","A statistical translation model"],"answer":1,"explain":"Tay learned from users and quickly became offensive/racist, showing that without guardrails/validation an AI can spiral out of control fast."},{"topic":"W1 · Intro to Cognitive Science","q":"Deep Blue (1997) is significant because it:","options":["Was the first chatbot","Defeated world chess champion Garry Kasparov","Invented the transformer","Was the first robot vacuum"],"answer":1,"explain":"Deep Blue, an IBM chess computer, defeated world champion Garry Kasparov — made possible by improved hardware."},{"topic":"W1 · Intro to Cognitive Science","q":"Which trio of founders is correctly matched to their fields?","options":["Miller–linguistics, Chomsky–psychology, Newell–philosophy","Miller–psychology, Simon & Newell–computer science, Chomsky–linguistics","Turing–biology, McCarthy–education, Miller–anthropology","Kasparov–AI, Watson–psychology, ELIZA–linguistics"],"answer":1,"explain":"George Miller (psychology), Simon & Newell (computer science), and Noam Chomsky (linguistics) were key founding figures."},{"topic":"W1 · Intro to Cognitive Science","q":"The problem that mental operations (e.g. recalling when you last saw a friend) are not consciously accessible means researchers:","options":["Can always directly observe the brain's steps","Must use indirect methods because the process is unconscious","Should ignore cognition entirely","Only need surveys to fully map the mind"],"answer":1,"explain":"Mental operations happen unconsciously and we usually cannot open the brain, so different fields use different indirect approaches."},{"topic":"W1 · Intro to Cognitive Science","q":"Which AI-system area is most directly linked to psycholinguistics?","options":["Cognitive robotics","Natural Language Processing (NLP)","Emotion recognition","Computer vision"],"answer":1,"explain":"NLP and models like GPT/BERT have foundations in psycholinguistics (understanding and generating text)."},{"topic":"W1 · Intro to Cognitive Science","q":"Neuroplasticity refers to the brain's ability to:","options":["Remain fixed after childhood","Reorganize and keep adapting/learning","Store an unlimited number of templates","Process only visual information"],"answer":1,"explain":"Neuroplasticity is the brain's capacity to adapt and keep learning/rewiring itself."},{"topic":"W1 · Intro to Cognitive Science","q":"Cognitive psychology is chiefly concerned with:","options":["The physical surgery of the brain","The human side of cognition — attention, perception, learning, memory","Building factory robots","Financial modelling"],"answer":1,"explain":"Cognitive psychology studies the human mind — how we attend, perceive, learn, remember and solve problems."},{"topic":"W2 · Cognitive Architectures","q":"A cognitive architecture is best described as:","options":["A type of neural network chip","A blueprint/framework that simulates the human cognition/learning process","A database schema","A brain-scanning machine"],"answer":1,"explain":"A cognitive architecture is a framework/blueprint used to simulate how humans think, learn and solve problems, predating modern neural networks."},{"topic":"W2 · Cognitive Architectures","q":"ACT-R stands for:","options":["Adaptive Control of Thought—Rational","Automatic Cognition Training Routine","Artificial Central Thinking Resource","Advanced Computational Theory of Reasoning"],"answer":0,"explain":"ACT-R = Adaptive Control of Thought—Rational, developed by John Anderson."},{"topic":"W2 · Cognitive Architectures","q":"In ACT-R, production (if-then) rules are stored in:","options":["Declarative memory","Procedural memory","The sensory register","The motor buffer"],"answer":1,"explain":"Procedural memory holds production rules; declarative memory stores facts/experiences as chunks."},{"topic":"W2 · Cognitive Architectures","q":"SOAR (State, Operator, And Result) is oriented toward modelling:","options":["A single narrow task","General intelligence across many tasks via goal-driven problem solving","Only visual perception","Only reflexes"],"answer":1,"explain":"SOAR aims at general intelligence through a unified, goal-driven problem-solving framework using operators and sub-goaling."},{"topic":"W2 · Cognitive Architectures","q":"Which learning mechanism is shared by both ACT-R and SOAR?","options":["Backpropagation","Chunking","Fuzzification","Tokenization"],"answer":1,"explain":"Both architectures compile experience into rules via chunking (and use reinforcement/utility learning)."},{"topic":"W2 · Cognitive Architectures","q":"'Spreading activation' in ACT-R helps the system to:","options":["Scan billions of rules every cycle","Efficiently link and activate related knowledge nodes","Delete memory","Encrypt data"],"answer":1,"explain":"Spreading activation efficiently links related nodes so the system need not scan all rules each cycle."},{"topic":"W2 · Cognitive Architectures","q":"Cognitive architectures like ACT-R and SOAR are historically significant because they:","options":["Were the first LLMs","Were early frameworks (rooted in the 1950s) to model human thinking before modern deep learning","Replaced the transformer","Are only used in gaming"],"answer":1,"explain":"They are among the foundational frameworks for modelling human cognition, predating CNNs/deep learning."},{"topic":"W3 · Perception","q":"Perception is best defined as:","options":["Storing information in long-term memory","Making sense of data gained from our senses","Randomly reacting to stimuli","Translating languages"],"answer":1,"explain":"Perception is making sense of the data/information extracted from the environment through the senses, requiring interpretation."},{"topic":"W3 · Perception","q":"The 'inverse projection problem' refers to the fact that:","options":["Images fall upside-down on the retina and the brain re-inverts them","The eye cannot detect colour","Sound is processed before light","Two eyes see two different worlds"],"answer":0,"explain":"Light projects an inverted image onto the retina; the brain re-inverts it so it makes sense."},{"topic":"W3 · Perception","q":"In the visual pathway, the LGN (Lateral Geniculate Nucleus) is responsible for:","options":["Final object naming","The first layer of filtering (e.g. motion, contrast)","Storing long-term memories","Producing speech"],"answer":1,"explain":"The LGN performs the first layer of filtering of incoming visual signals, handling things like motion and contrast."},{"topic":"W3 · Perception","q":"At V1, the 'where' pathway (vision for action) primarily processes:","options":["Colour and identity","Direction and motion","Taste and smell","Grammar"],"answer":1,"explain":"The 'where' pathway handles direction and motion (e.g. reacting to a fast car), while the 'what' pathway handles facts like colour and identity."},{"topic":"W3 · Perception","q":"Why do humans have two eyes, according to the lecture?","options":["For symmetry only","To obtain depth information","To double storage capacity","To hear better"],"answer":1,"explain":"Two eyes provide depth (binocular) information; one eye works but is less accurate."},{"topic":"W3 · Perception","q":"Which techniques are used by neuroscience to study how the brain processes objects?","options":["BLEU and n-grams","EEG and fMRI","OWL and RDF","PCA and t-SNE"],"answer":1,"explain":"Brain activity during object recognition is studied using EEG and fMRI."},{"topic":"W3 · Perception","q":"The Gestalt principle of 'closure' states that:","options":["Similar items are grouped","Incomplete figures are perceived as complete","Moving items form a unit","Closer items belong together"],"answer":1,"explain":"Closure: we perceive incomplete figures as complete wholes (e.g. Pac-Man shapes forming a triangle)."},{"topic":"W3 · Perception","q":"Birds flying in the same direction being seen as one group illustrates which Gestalt principle?","options":["Proximity","Common fate","Closure","Similarity"],"answer":1,"explain":"Common fate: objects moving in the same direction are perceived as a single unit/group."},{"topic":"W3 · Perception","q":"'Figure and ground' refers to:","options":["Two colours of light","Seeing an object as a main figure vs. its background","The two visual pathways","The retina and the lens"],"answer":1,"explain":"We perceive scenes in two layers — the figure (main object) and the ground (background); which we see first determines the interpretation."},{"topic":"W3 · Perception","q":"When you go to a forest already knowing what forests look like, you are using:","options":["Bottom-up processing","Top-down processing","Template matching","Feature integration"],"answer":1,"explain":"Top-down processing uses prior knowledge/expectation to guide perception."},{"topic":"W3 · Perception","q":"Palmer's (1975) contextual scene experiment showed that participants:","options":["Could not see any objects","Identified context-consistent objects (e.g. bread in a kitchen) more accurately","Preferred abstract art","Had no prior expectations"],"answer":1,"explain":"Shown a kitchen scene, ~80% correctly identified the bread (context-consistent), demonstrating top-down/prior-experience effects."},{"topic":"W3 · Perception","q":"The key limitation of Template Theory of pattern recognition is that:","options":["It ignores colour","It would require an impractical number of stored templates for every variation","It uses too much attention","It cannot handle sound"],"answer":1,"explain":"Template theory needs a template for every variation (font, size, orientation), which is impractical and fails on mismatched orientation."},{"topic":"W3 · Perception","q":"Marr's model is associated with which theory of pattern recognition?","options":["Template theory","Feature theory","Structural theory","Prototype theory"],"answer":1,"explain":"Feature theory (Marr's model) breaks objects into features/components that combine to form objects; it is a foundation for image processing."},{"topic":"W3 · Perception","q":"Feature Integration Theory adds which element that earlier feature theory lacked?","options":["Spatial coordinates","A two-stage process with attention (pre-attentive then focused)","3-D geons","Truth tables"],"answer":1,"explain":"Feature Integration Theory adds attention: a pre-attentive stage (automatic feature registration) then a focused-attention stage that binds features."},{"topic":"W3 · Perception","q":"In a visual search task, a target 'pops out' effortlessly when there are:","options":["Many combined-feature distractors","Few distractors","No colours","Only letters"],"answer":1,"explain":"With few distractors the target pops out; many distractors with combined features require attention and increase reaction time."},{"topic":"W3 · Perception","q":"Structural Theory improves on feature theories by adding:","options":["Spatial relationships between features (using 3-D geons)","More templates","Fewer features","Random guessing"],"answer":0,"explain":"Structural theory incorporates spatial relationships and introduces 3-D primitive components called geons."},{"topic":"W3 · Perception","q":"Compared with human vision, computer vision typically:","options":["Is always 100% certain","Gives probabilistic/estimated answers (e.g. 84% tomato)","Never needs training data","Cannot detect objects"],"answer":1,"explain":"Computers output probabilistic estimates and need new datasets for novel variations, whereas humans generalise and are more accurate."},{"topic":"W3 · Perception","q":"In a CNN, the classification layer typically outputs:","options":["A single certain label","A probability distribution over possible objects","Raw pixel values","A grammar tree"],"answer":1,"explain":"CNNs end with a classification layer giving a probability distribution (0–1); the highest probability is the predicted object."},{"topic":"W3 · Perception","q":"An 'Area of Interest / Region of Interest' in perception/eye-tracking is analogous in computer vision to a:","options":["Loss function","Bounding box","Truth table","Fuzzy set"],"answer":1,"explain":"An AOI/ROI segments the region to analyse, analogous to a bounding box in computer vision."},{"topic":"W3 · Perception","q":"The progressive nature of recognition means the brain:","options":["Recognises whole objects instantly and completely","Builds features up progressively (orientation, colour → shape → object)","Only uses one eye","Ignores context"],"answer":1,"explain":"Recognition is progressive: low-level features are combined step by step (orientation/colour → shape/texture → integrated object)."},{"topic":"W4 · Attention & Awareness","q":"Selective attention refers to the ability to:","options":["Attend to everything at once","Focus on relevant information while filtering out the rest","Store unlimited memories","Move the eyes randomly"],"answer":1,"explain":"Selective attention is focusing on relevant stimuli while filtering out irrelevant information."},{"topic":"W4 · Attention & Awareness","q":"The 'cocktail party effect' describes our ability to:","options":["Hear only music","Focus on one conversation among many yet still notice our name","Ignore all sound","See in the dark"],"answer":1,"explain":"The cocktail party effect is focusing on one auditory stream while still detecting salient input (like your name) elsewhere."},{"topic":"W4 · Attention & Awareness","q":"Broadbent's filter model proposes that attention acts as an early:","options":["Amplifier of all inputs","Filter that selects information based on physical characteristics","Random shuffler","Long-term store"],"answer":1,"explain":"Broadbent's early-selection filter model selects inputs by physical features before deeper processing."},{"topic":"W4 · Attention & Awareness","q":"Treisman's attenuation model differs from Broadbent's by proposing that unattended information is:","options":["Completely blocked","Weakened/attenuated but not fully blocked","Amplified","Deleted permanently"],"answer":1,"explain":"Treisman argued unattended channels are attenuated (turned down) rather than entirely filtered out."},{"topic":"W4 · Attention & Awareness","q":"Failing to notice an obvious unexpected object while focusing on a task is called:","options":["Inattentional blindness","Colour blindness","The Stroop effect","Priming"],"answer":0,"explain":"Inattentional blindness is missing a salient stimulus because attention is engaged elsewhere."},{"topic":"W4 · Attention & Awareness","q":"The 'spotlight' metaphor of attention suggests attention is:","options":["Fixed on the whole scene equally","Focused on a limited region that can be moved","Only auditory","Unlimited in capacity"],"answer":1,"explain":"The spotlight metaphor casts attention as a movable focus that enhances processing within a limited region."},{"topic":"W4 · Attention & Awareness","q":"In transformers, the 'attention' mechanism is conceptually inspired by human attention because it:","options":["Randomly selects words","Weights the importance of different inputs (what to focus on)","Stores images","Removes grammar"],"answer":1,"explain":"Self-attention weights the relevance of different tokens — echoing how human attention selectively focuses (the 'Attention Is All You Need' link noted in Lecture 1)."},{"topic":"W4 · Attention & Awareness","q":"Divided attention refers to:","options":["Attending to a single task perfectly","Trying to attend to multiple tasks at once (limited by capacity)","Sleeping","Ignoring all stimuli"],"answer":1,"explain":"Divided attention is splitting attention across tasks; human multitasking is limited by attentional capacity."},{"topic":"W4 · Eye Tracking","q":"The 'eye-mind hypothesis' states that:","options":["The eyes move randomly","What the eye looks at reflects the current underlying thinking","The mind ignores visual input","Blinking stops all cognition"],"answer":1,"explain":"The eye-mind hypothesis holds that whatever the eye is looking at reflects the underlying thinking happening at that moment."},{"topic":"W4 · Eye Tracking","q":"A heat map in eye tracking shows:","options":["The order of gaze points","Where many people looked (darker/red = most attention)","The pupil diameter over time","The blink rate"],"answer":1,"explain":"A heat map uses a colour spectrum where darker/red areas indicate where most people looked (most attention)."},{"topic":"W4 · Eye Tracking","q":"Which output shows the numbered order/progression of a viewer's gaze?","options":["Heat map","Opacity map","Scan path","Area of interest"],"answer":2,"explain":"A scan path shows the numbered progression (1→2→3…) of gaze over time."},{"topic":"W4 · Eye Tracking","q":"Pupil size (dilation) in eye tracking is mainly an indicator of:","options":["Grammar knowledge","Physiological arousal (e.g. fear/danger)","Screen brightness only","Reading speed"],"answer":1,"explain":"Pupils dilate with arousal — fear, danger or stress — making pupil size useful for warning/danger prediction."},{"topic":"W4 · Eye Tracking","q":"Which is one of the three main types of eye movement discussed?","options":["Fixation","Convolution","Backpropagation","Tokenization"],"answer":0,"explain":"The three main eye movements are fixation, saccade, and smooth pursuit."},{"topic":"W4 · Eye Tracking","q":"A saccade is:","options":["The eye holding still on a point","A rapid jump between fixations","Smoothly following a moving object","A blink"],"answer":1,"explain":"A saccade is the rapid jump between fixations; a fixation holds still, and smooth pursuit follows a moving object."},{"topic":"W4 · Eye Tracking","q":"In an eye tracker, the small reflection on the cornea used to compute gaze direction is called the:","options":["Glint","Fovea","Sclera","Iris"],"answer":0,"explain":"The corneal reflection is called the glint; combined with pupil data it determines gaze direction."},{"topic":"W4 · Eye Tracking","q":"Which two camera types are combined in a glasses eye tracker?","options":["Thermal and X-ray","Infrared (eye) and scene camera (environment)","Ultrasound and radar","Webcam and microphone"],"answer":1,"explain":"An infrared camera records the eye and a scene camera records the environment; an algorithm maps gaze onto the scene."},{"topic":"W4 · Eye Tracking","q":"Calibration in eye tracking is necessary because:","options":["Every person's gaze movement is a unique 'signature'","All eyes are identical","It reduces file size","It powers the infrared light"],"answer":0,"explain":"Each person's gaze is a unique signature, so calibration (looking at markers) tailors the tracker to the individual."},{"topic":"W4 · Eye Tracking","q":"'Time to first fixation' measures:","options":["Total time spent looking","How fast attention is captured after stimulus onset","The number of blinks","The pupil colour"],"answer":1,"explain":"Time to first fixation indicates how quickly attention is captured after the stimulus appears."},{"topic":"W4 · Eye Tracking","q":"A long total fixation duration on a region can indicate:","options":["The region is invisible","Deeper mental processing or that the item is difficult","The tracker is broken","The participant is asleep"],"answer":1,"explain":"Longer fixation duration can reflect deeper mental processing or difficulty with that part of the stimulus."},{"topic":"W4 · Eye Tracking","q":"Which manufacturers are named as used in the course project?","options":["Tobii and Pupil Labs","Google and Meta","IBM and NVIDIA","Sony and Roomba"],"answer":0,"explain":"The course uses Tobii and Pupil Labs (Pupil Invisible) trackers."},{"topic":"W4 · Eye Tracking","q":"Early (1800s) eye trackers were described as:","options":["Wireless and cheap","Invasive (a contact lens attached to a needle)","Purely software-based","Built into phones"],"answer":1,"explain":"Early trackers were invasive — a contact lens attached to a needle connected to an oscillator; modern ones are non-invasive."},{"topic":"W4 · Eye Tracking","q":"In the medical eye-tracking example, 'human-in-the-loop' means:","options":["The AI acts with no human input","The human can accept or override the AI's suggestion","The patient controls the tracker","Only the AI makes final decisions"],"answer":1,"explain":"Human-in-the-loop: the AI gives a suggestion/warning and the human expert can confirm or override it, forming a feedback loop."},{"topic":"W4 · Eye Tracking","q":"An eye tracker's sampling rate is best described as:","options":["The number of gaze data points captured per second","The screen resolution","The battery life","The number of participants"],"answer":0,"explain":"Sampling rate is data points per second — from ~60 up to ~1000+ Hz — which is why eye tracking generates large amounts of data."},{"topic":"W4 · Eye Tracking","q":"Why is eye tracking useful compared with simply asking people where they looked?","options":["People always remember perfectly","It captures unconscious gaze that people cannot fully articulate","It is cheaper than a survey","It requires no equipment"],"answer":1,"explain":"Gaze happens unconsciously and people forget or can't articulate every fixation, so eye tracking records it objectively."},{"topic":"W4 · Eye Tracking","q":"An 'opacity (focus) map' differs from a heat map in that it:","options":["Shows the numbered gaze order","Highlights (reveals) only the regions people looked at, dimming the rest","Measures blink rate","Records audio"],"answer":1,"explain":"An opacity/focus map reveals only the looked-at regions and dims the rest, unlike a heat map's colour spectrum."},{"topic":"W5 · Memory","q":"The Atkinson–Shiffrin multi-store model proposes the sequence:","options":["Long-term → short-term → sensory","Sensory memory → short-term memory → long-term memory","Working → sensory → procedural","Semantic → episodic → sensory"],"answer":1,"explain":"The multi-store model flows sensory memory → short-term memory → long-term memory, with rehearsal transferring items to LTM."},{"topic":"W5 · Memory","q":"Miller's classic estimate of short-term memory capacity is about:","options":["7 (±2) items","70 items","2 items","Unlimited"],"answer":0,"explain":"Miller's 'magical number seven' put STM capacity at about 7±2 items (the lecturer noted modern estimates nearer ~4)."},{"topic":"W5 · Memory","q":"In Baddeley's working memory model, the component that handles verbal/auditory information is the:","options":["Visuospatial sketchpad","Phonological loop","Central executive","Episodic buffer"],"answer":1,"explain":"The phonological loop handles verbal/auditory material; the visuospatial sketchpad handles visual/spatial information."},{"topic":"W5 · Memory","q":"In Baddeley's model, the component that coordinates and allocates attention among subsystems is the:","options":["Phonological loop","Central executive","Visuospatial sketchpad","Sensory register"],"answer":1,"explain":"The central executive directs attention and coordinates the phonological loop and visuospatial sketchpad."},{"topic":"W5 · Memory","q":"Memory for facts and general knowledge (e.g. 'Paris is a city') is:","options":["Procedural memory","Semantic memory","Episodic memory","Sensory memory"],"answer":1,"explain":"Semantic memory stores general facts/knowledge; episodic memory stores personal events; procedural stores skills."},{"topic":"W5 · Memory","q":"Memory for personally experienced events (e.g. your last birthday) is:","options":["Semantic memory","Episodic memory","Procedural memory","Working memory"],"answer":1,"explain":"Episodic memory is autobiographical memory of specific events and experiences."},{"topic":"W5 · Memory","q":"Memory for skills and 'how to' knowledge (e.g. riding a bike) is:","options":["Procedural memory","Semantic memory","Episodic memory","Iconic memory"],"answer":0,"explain":"Procedural memory stores skills/habits and is typically implicit (e.g. riding a bike)."},{"topic":"W5 · Memory","q":"'Chunking' improves short-term memory by:","options":["Deleting information","Grouping items into larger meaningful units","Slowing rehearsal","Blocking retrieval"],"answer":1,"explain":"Chunking groups individual items into larger meaningful units, effectively increasing STM capacity."},{"topic":"W5 · Memory","q":"Which AI mechanism is most often compared to human working memory?","options":["A CNN convolution layer","LSTM gating / attention (holding relevant recent information)","A truth table","A bounding box"],"answer":1,"explain":"LSTM gating and attention mechanisms hold and manage recent relevant information, analogous to working memory."},{"topic":"W6 · Knowledge Representation","q":"An analogical mental representation is one that:","options":["Is abstract with no image (e.g. justice)","Resembles what it represents (visual/pictorial)","Uses only truth tables","Cannot be recalled"],"answer":1,"explain":"Analogical representations resemble what they represent (e.g. picturing an engine); symbolic ones are abstract (truth, justice)."},{"topic":"W6 · Knowledge Representation","q":"In cognition, 'mental procedures' include operations such as:","options":["Deducing, searching, matching, retrieving","Boiling and freezing","Printing and scanning","Buying and selling"],"answer":0,"explain":"Mental procedures are the processes acting on the knowledge base: deducing, searching, matching, rotating, retrieving."},{"topic":"W6 · Knowledge Representation","q":"A schema is best described as:","options":["A single word","A structured cluster of world knowledge about an event/situation","A random list","A pixel grid"],"answer":1,"explain":"A schema is a structured cluster of world knowledge (nodes and links) about an event, object or situation."},{"topic":"W6 · Knowledge Representation","q":"In the 'office schema experiment', about 30% of participants reported seeing a book that wasn't there because:","options":["The book was hidden","Their memory was influenced by the familiar office schema","They were told to lie","The room was dark"],"answer":1,"explain":"Participants' recall was shaped by the common office schema, so many 'remembered' a book that was never present."},{"topic":"W6 · Knowledge Representation","q":"A 'script' in knowledge representation is:","options":["A sequence of actions/events (e.g. eating at a restaurant)","A single fact","A probability distribution","A pixel map"],"answer":0,"explain":"A script is an ordered sequence of actions (e.g. find seat → order → eat → pay) with scenes, actors and preconditions."},{"topic":"W6 · Knowledge Representation","q":"Recalling a word never shown (e.g. 'sleep' from a sleep-related list) demonstrates:","options":["Photographic memory","False memory","Perfect recall","Colour blindness"],"answer":1,"explain":"This is false memory — schema-driven association inserts a strongly related word that was not actually presented."},{"topic":"W6 · Knowledge Representation","q":"In the Collins & Quillian (1967) semantic network, shared properties are stored at the highest node and inherited downward. This principle is called:","options":["Cognitive economy","Overfitting","Backpropagation","Fuzzification"],"answer":0,"explain":"Cognitive economy: common properties are stored once at a high node and inherited, avoiding repetition."},{"topic":"W6 · Knowledge Representation","q":"In the sentence-verification task, 'a pomegranate is a fruit' takes longer to verify than 'an apple is a fruit' because:","options":["Pomegranate is not a fruit","It is less prototypical / stored 'further' in the network","Apples are rarer","The words are longer"],"answer":1,"explain":"Less prototypical items require traversing 'further' in the semantic network, increasing response time."},{"topic":"W6 · Knowledge Representation","q":"Symbolic AI representation is characterised by being:","options":["A black box learned from data","Rule/logic-based, human-readable and explainable","Purely probabilistic","Unable to reason"],"answer":1,"explain":"Symbolic representation uses rules, logic and symbols; it is human-readable, consistent and explainable."},{"topic":"W6 · Knowledge Representation","q":"Sub-symbolic AI (e.g. CNN, BERT) is best described as:","options":["Rule-based and fully transparent","Learned from data and often a 'black box'","A truth table","An ontology"],"answer":1,"explain":"Sub-symbolic systems learn implicit patterns from data and are hard to interpret (black box)."},{"topic":"W6 · Knowledge Representation","q":"Predicate logic differs from propositional logic mainly by adding:","options":["Images","Quantifiers ('for all', 'there exists')","Fuzzy sets","Embeddings"],"answer":1,"explain":"Predicate logic adds quantifiers (∀ 'for all', ∃ 'there exists'), giving more expressive meaning than propositional logic."},{"topic":"W6 · Knowledge Representation","q":"In an expert system, the component that applies rules to facts is the:","options":["User interface","Inference engine","Knowledge base","Sensor"],"answer":1,"explain":"The inference engine integrates rules from the knowledge base with facts to reason toward a conclusion."},{"topic":"W6 · Knowledge Representation","q":"'Smoke detected → trigger alarm' (from data to conclusion) is an example of:","options":["Backward chaining","Forward chaining","Fuzzification","Embedding"],"answer":1,"explain":"Forward chaining reasons from data/facts toward a conclusion; backward chaining starts from a goal."},{"topic":"W6 · Knowledge Representation","q":"Diagnosing why a car won't start by checking battery → fuel pump → ignition (goal to sub-goals) is:","options":["Forward chaining","Backward chaining","Random search","Clustering"],"answer":1,"explain":"Backward chaining is a top-down, goal-driven approach that works from the goal back through possible causes."},{"topic":"W6 · Knowledge Representation","q":"A 'frame' in knowledge representation is most like a:","options":["Truth table","Data structure with slots (attributes, default values, procedures)","Neural network","Fuzzy set"],"answer":1,"explain":"A frame is like a data structure with slots holding attributes, default values, constraints and procedures; it supports inheritance."},{"topic":"W6 · Knowledge Representation","q":"OWL (Web Ontology Language) is used to build:","options":["Fuzzy controllers","Ontologies (concepts, classes, properties, relationships)","CNNs","Heat maps"],"answer":1,"explain":"OWL is a common language for building ontologies — formal representations of concepts, classes, properties and relationships."},{"topic":"W6 · Knowledge Representation","q":"Which modern representation uses Bayesian networks or Hidden Markov Models to handle uncertainty?","options":["Probabilistic representation","Symbolic logic","Template matching","Constituency parsing"],"answer":0,"explain":"Probabilistic representation handles uncertain/non-binary knowledge using Bayesian networks and (Hidden) Markov models."},{"topic":"W6 · Knowledge Representation","q":"Fuzzy representation is most appropriate when:","options":["Knowledge is strictly binary","Knowledge has degrees of truth (e.g. cold/warm/hot)","There is no data","Only symbols are used"],"answer":1,"explain":"Fuzzy logic captures degrees of truth via membership functions and linguistic variables (cold/warm/hot), not just binary values."},{"topic":"W6 · Knowledge Representation","q":"In embeddings, semantically similar items (e.g. king–queen) are represented as vectors that are:","options":["Far apart","Close together in vector space","Identical to random words","Non-numeric"],"answer":1,"explain":"Embeddings map information to numeric vectors so semantically similar items cluster close together by distance metric."},{"topic":"W6 · Knowledge Representation","q":"Neuro-symbolic AI aims to combine:","options":["Two neural networks","Neural networks (pattern recognition) with symbolic AI (rules/logic)","Two fuzzy controllers","Two ontologies"],"answer":1,"explain":"Neuro-symbolic AI combines neural networks (learning/pattern recognition, black-box) with symbolic AI (explainable rules/logic) for reasoning and to reduce hallucination — a step toward AGI."},{"topic":"W7 · Learning","q":"According to Jim Davis, one defining feature of learning is that the change is:","options":["For more effective future action","Always caused by an external force","Purely random","Impossible to quantify"],"answer":0,"explain":"Davis's features: a system undergoes change, for more effective future action, in response to experience, and the system itself executes the change."},{"topic":"W7 · Learning","q":"Pavlov's dog experiment is the classic example of:","options":["Reinforcement via rewards","Classical conditioning","Observational learning","Transfer learning"],"answer":1,"explain":"Pavlov's dog (bell → salivation) illustrates classical conditioning under behaviourism."},{"topic":"W7 · Learning","q":"Piaget's theory explains learning as knowledge being:","options":["Fixed at birth","Constructed and refined over time via assimilation and accommodation","Copied from templates","Downloaded instantly"],"answer":1,"explain":"Piaget's cognitive development describes knowledge constructed over time through assimilation and accommodation."},{"topic":"W7 · Learning","q":"Connectionism as a learning theory is the precursor to:","options":["Expert systems","Neural networks / deep learning","Fuzzy logic","Ontologies"],"answer":1,"explain":"Connectionism (spreading activation, weights, feed-forward/backprop) underlies neural networks and deep learning."},{"topic":"W7 · Learning","q":"Behaviourism (stimulus–response, rewards) most directly inspired which AI approach?","options":["Reinforcement learning","Unsupervised clustering","Ontology building","Constituency parsing"],"answer":0,"explain":"Behaviourism's reward-driven conditioning underlies reinforcement learning."},{"topic":"W7 · Learning","q":"Explicit learning (conscious, intentional, e.g. studying for an exam) maps most directly to:","options":["Unsupervised learning","Supervised / rule-based learning","Clustering","Dimensionality reduction"],"answer":1,"explain":"Explicit, intentional learning with clear goals maps to supervised and rule-based learning (labels, ground truth)."},{"topic":"W7 · Learning","q":"Implicit learning (unconscious, e.g. riding a bike, muscle memory) is analogous to:","options":["Supervised learning","Unsupervised learning / pattern recognition","Rule-based expert systems","Backward chaining"],"answer":1,"explain":"Implicit, label-free learning parallels unsupervised learning/pattern recognition, where there is no ground truth."},{"topic":"W7 · Learning","q":"According to the lecturer, an AI system 'learns' by essentially:","options":["Understanding like a human","Predicting and comparing outputs to ground truth (reducing error)","Memorising every rule","Using intuition"],"answer":1,"explain":"The lecturer stressed AI does not learn like a human — it predicts and compares to ground truth, improving as error decreases."},{"topic":"W7 · Learning","q":"ACT-R was developed by John Anderson and is a cognitive architecture that is:","options":["Purely symbolic","A hybrid of symbolic and sub-symbolic systems","Only a neural network","A fuzzy controller"],"answer":1,"explain":"ACT-R (Adaptive Control of Thought—Rational) is a hybrid of symbolic (rules) and sub-symbolic systems."},{"topic":"W7 · Learning","q":"In ACT-R, facts and experiences are stored as 'chunks' in which memory?","options":["Procedural memory","Declarative memory","Motor buffer","Sensory register"],"answer":1,"explain":"Declarative memory stores facts/experiences as chunks; procedural memory holds production (if-then) rules."},{"topic":"W7 · Learning","q":"SOAR (State, Operator, And Result) is designed primarily to model:","options":["A single specific task","General intelligence across many tasks","Only vision","Only language translation"],"answer":1,"explain":"SOAR models general intelligence via a unified, goal-driven framework, whereas ACT-R focuses more on specific tasks."},{"topic":"W7 · Learning","q":"A learning mechanism common to BOTH ACT-R and SOAR is:","options":["Fuzzification","Chunking","Tokenization","Outpainting"],"answer":1,"explain":"Both architectures use chunking (and reinforcement/utility learning) to compile experience into rules."},{"topic":"W7 · Learning","q":"Applying knowledge of riding a bicycle to riding a motorbike is an example of:","options":["Far transfer","Near transfer","Overfitting","Fuzzy logic"],"answer":1,"explain":"Similar-domain transfer is near transfer; applying to a very different domain (e.g. logic puzzles → algorithm design) is far transfer."},{"topic":"W7 · Learning","q":"'Overfitting' in AI is compared to which human behaviour?","options":["Deep conceptual understanding","Rote memorization without understanding","Creative problem solving","Analogical reasoning"],"answer":1,"explain":"Overfitting is like rote memorization — good training accuracy but poor generalization to new data."},{"topic":"W7 · Learning","q":"The 'forgetting curve' point in the lecture implies that new material should be:","options":["Never reviewed","Repeated (spaced repetition) to aid retention","Learned only once","Memorised backwards"],"answer":1,"explain":"Much new material is forgotten within the first ~9 hours unless repeated; spaced repetition improves retention."},{"topic":"W7 · Learning","q":"In reinforcement learning, the 'policy' is:","options":["The reward value","The strategy mapping states to actions, updated to maximise reward","The training dataset","The loss function"],"answer":1,"explain":"The policy maps states to actions and is updated over cycles to maximise cumulative reward."},{"topic":"W7 · Learning","q":"In a supervised learning pipeline, data is typically split into:","options":["Only training","Training / validation / test sets","Only test","Fuzzy sets"],"answer":1,"explain":"Data is split into training, validation and test sets (e.g. 80/20 or 70/20/10) to check generalization."},{"topic":"W7 · Learning","q":"The 'learning rate' hyperparameter controls:","options":["The number of classes","How fast the weights update/adapt","The screen resolution","The number of participants"],"answer":1,"explain":"Learning rate controls how quickly weights are updated during training/adaptation."},{"topic":"W7 · Forgetting","q":"The Ebbinghaus 'forgetting curve' shows that:","options":["Memory improves without review","Retention drops rapidly soon after learning unless reviewed","Nothing is ever forgotten","Only skills are forgotten"],"answer":1,"explain":"The forgetting curve shows rapid loss of newly learned material over time unless it is reviewed/repeated."},{"topic":"W7 · Forgetting","q":"When old learning interferes with new learning, it is called:","options":["Retroactive interference","Proactive interference","Decay","Encoding"],"answer":1,"explain":"Proactive interference: old memories disrupt new learning. Retroactive is the reverse (new disrupts old)."},{"topic":"W7 · Forgetting","q":"When new learning interferes with the recall of old memories, it is called:","options":["Proactive interference","Retroactive interference","Rehearsal","Chunking"],"answer":1,"explain":"Retroactive interference is when newer information disrupts recall of older memories."},{"topic":"W7 · Forgetting","q":"Decay theory of forgetting attributes memory loss to:","options":["Interference from other memories","The fading of memory traces over time when not used","Too much rehearsal","Cue overload"],"answer":1,"explain":"Decay theory holds that unused memory traces fade with the passage of time."},{"topic":"W7 · Forgetting","q":"Spaced repetition helps retention because it:","options":["Reviews material at increasing intervals to counter the forgetting curve","Deletes weak memories","Removes the need to study","Only works for images"],"answer":0,"explain":"Spaced repetition reviews material at spaced intervals, strengthening retention against the forgetting curve."},{"topic":"W8 · Emotion","q":"The James–Lange theory of emotion proposes that:","options":["Emotion causes physiological change","Physiological/bodily responses come first and we then interpret them as emotion","Emotion and arousal are unrelated","Only cognition matters"],"answer":1,"explain":"James–Lange: we perceive bodily changes first (e.g. racing heart) and interpret them as emotion (fear)."},{"topic":"W8 · Emotion","q":"The Schachter–Singer (two-factor) theory states that emotion arises from:","options":["Physiological arousal plus cognitive appraisal/labelling","Arousal alone","Cognition alone","Neither arousal nor cognition"],"answer":0,"explain":"The two-factor theory: emotion = physiological arousal + a cognitive label/interpretation of that arousal."},{"topic":"W8 · Emotion","q":"Paul Ekman is known for proposing a set of:","options":["Universal basic emotions with recognizable facial expressions","Memory stores","Parsing algorithms","Attention filters"],"answer":0,"explain":"Ekman proposed universal basic emotions (e.g. happiness, sadness, anger, fear, disgust, surprise) with cross-cultural facial expressions."},{"topic":"W8 · Emotion","q":"'Affective computing' refers to AI systems that:","options":["Compute faster","Recognize, interpret, or simulate human emotions","Only translate text","Store more data"],"answer":1,"explain":"Affective computing is AI that can detect, interpret, or simulate human emotions (e.g. emotion recognition)."},{"topic":"W8 · Emotion","q":"In the Cannon–Bard theory, physiological arousal and the emotional experience occur:","options":["Sequentially (arousal first)","Simultaneously and independently","Never together","Only after labelling"],"answer":1,"explain":"Cannon–Bard proposes arousal and emotional experience happen at the same time, independently."},{"topic":"W8 · Emotion","q":"Emotion recognition from customer text/intonation (e.g. in chatbots) is useful because it lets systems:","options":["Ignore the customer","Adapt responses to the user's emotional state","Delete the conversation","Translate languages only"],"answer":1,"explain":"Detecting emotion lets systems respond appropriately (e.g. avoid angering an already-frustrated customer)."},{"topic":"W8 · Emotion","q":"A key challenge in building emotion-aware AI is that emotions are:","options":["Simple and binary","Complex, context-dependent and hard to model precisely","Irrelevant to cognition","Identical across all situations"],"answer":1,"explain":"Emotions are complex and context-dependent, making them difficult to model — still an area of active work."},{"topic":"W9 · Language","q":"A phoneme is the smallest unit of:","options":["Meaning","Sound","Grammar","Vision"],"answer":1,"explain":"A phoneme is the smallest unit of sound (e.g. changing 'big' to 'pig'); a morpheme is the smallest unit of meaning."},{"topic":"W9 · Language","q":"A morpheme is the smallest unit of:","options":["Sound","Meaning","Pixels","Attention"],"answer":1,"explain":"A morpheme is the smallest unit of meaning (e.g. 'bedroom' = bed + room)."},{"topic":"W9 · Language","q":"The 'lexicon' refers to:","options":["A grammar rule","A person's total vocabulary of words","A brain region","An eye movement"],"answer":1,"explain":"The lexicon is a person's vocabulary; it grows with reading/communication (infant→adult ≈ 50,000 words)."},{"topic":"W9 · Language","q":"The phonemic restoration effect (1970) demonstrated that listeners:","options":["Could pinpoint a cough exactly","Could not locate a cough replacing a phoneme and used following meaning to restore it","Ignored all speech","Only understood written text"],"answer":1,"explain":"Listeners couldn't locate the cough or notice the missing phoneme; restoration depended on the meaning that followed."},{"topic":"W9 · Language","q":"Why is speech segmentation harder in an unfamiliar language?","options":["The speaker talks louder","The speech signal is continuous and lacks clear word boundaries without known meaning","There are no phonemes","It has no grammar"],"answer":1,"explain":"Speech is a continuous signal; without knowing the language, segmenting words is difficult (it sounds like one blur)."},{"topic":"W9 · Language","q":"The word superiority effect states that a letter is recognized faster when it:","options":["Is shown alone","Is part of a real word","Is upside down","Is in a foreign script"],"answer":1,"explain":"Letters are recognized faster within a real word than in isolation or nonsense strings (if the language is known)."},{"topic":"W9 · Language","q":"In Keith Rayner's eye-tracking study, low-frequency words received about:","options":["No fixation","40% more fixation time than high-frequency words","The same fixation as spaces","Less attention than punctuation"],"answer":1,"explain":"Low-frequency (unfamiliar) words drew ~40% more fixation time because they require more processing."},{"topic":"W9 · Language","q":"The word 'bug' meaning insect, listening device, or to annoy is an example of:","options":["A morpheme","Lexical ambiguity","A phoneme","A saccade"],"answer":1,"explain":"Lexical ambiguity: a word with multiple meanings, resolved using sentence context."},{"topic":"W9 · Language","q":"Semantics concerns ___ while syntax concerns ___:","options":["arrangement; meaning","meaning; arrangement/grammar","sound; vision","reward; penalty"],"answer":1,"explain":"Semantics is the meaning of words in relation to each other; syntax is their arrangement/grammatical structure."},{"topic":"W9 · Language","q":"EEG studies show a brain signal spike when a sentence is:","options":["Grammatically and semantically correct","Semantically or syntactically incorrect (e.g. 'the cats won't bake')","Spoken slowly","In the person's native language"],"answer":1,"explain":"The brain produces a threshold-crossing signal to flag semantically/syntactically wrong sentences."},{"topic":"W9 · Language","q":"A 'garden-path sentence' causes difficulty because of:","options":["Missing vocabulary","Late closure — we keep attaching words until the parse fails and must re-read","No verbs","Too many phonemes"],"answer":1,"explain":"Garden-path sentences trigger late closure: we keep attaching new words to the current phrase until it fails, forcing a re-read."},{"topic":"W9 · Language","q":"In the interactionist approach to parsing:","options":["Syntax is processed before semantics","Syntax and semantics are processed at the same time","Only sound is processed","Grammar is ignored"],"answer":1,"explain":"The interactionist approach processes syntax and semantics simultaneously (meaning can immediately constrain interpretation)."},{"topic":"W9 · Language","q":"'Shakespeare wrote Hamlet at his desk' → we infer he used a quill, not a laptop. This is which type of inference?","options":["Anaphoric","Instrumental","Causal","Phonemic"],"answer":1,"explain":"Instrumental inference implies the tool used; anaphoric links to a person/object; causal links an effect to a prior cause."},{"topic":"W9 · Language","q":"ELIZA (1966) is an example of which early language approach?","options":["Transformer","Rule-based / pattern-matching system","Statistical machine translation","Contextual embeddings"],"answer":1,"explain":"ELIZA was a rule-based/pattern-matching chatbot (symbolic AI), limited because it did not generalise."},{"topic":"W9 · Language","q":"Statistical Machine Translation (SMT) treats translation as:","options":["A rule lookup","A probabilistic process to find the most likely translation","A neural attention process","A fuzzy control problem"],"answer":1,"explain":"SMT treats translation as a probabilistic process, using n-grams, a target language model, translation model and decoder (optimised by BLEU)."},{"topic":"W9 · Language","q":"A key limitation of SMT is that it:","options":["Requires no data","Has no long memory (n-gram based) and needs manual feature engineering","Understands ambiguity perfectly","Uses self-attention"],"answer":1,"explain":"SMT lacks long memory, struggles with word-alignment for ambiguous words, and needs manual feature engineering."},{"topic":"W9 · Language","q":"Compared with RNN and LSTM, the Transformer (2017) added:","options":["Only sequential processing","Self-attention and positional encoding with parallel processing","A vanishing gradient","No memory at all"],"answer":1,"explain":"Transformers introduced self-attention and positional encoding and process in parallel, handling long-range dependencies and ambiguity better."},{"topic":"W9 · Language","q":"LSTM improves on plain RNN mainly through:","options":["Positional encoding","Gating mechanisms that act like working memory","Fuzzy sets","Ontologies"],"answer":1,"explain":"LSTM uses gates to control information flow (like working memory), mitigating the RNN vanishing-gradient/short-memory problem."},{"topic":"W9 · Language","q":"A key limitation of static embeddings (word2vec, GloVe) is that:","options":["They give each word one fixed vector regardless of context","They are too slow to compute","They cannot be visualised","They only work for images"],"answer":0,"explain":"Static embeddings assign one fixed vector per word, so ambiguous words like 'bank' get the same vector in all contexts."},{"topic":"W9 · Language","q":"Contextual embeddings (e.g. BERT) improve on static embeddings because they:","options":["Give a word different vectors depending on context","Use fewer dimensions always","Ignore word order","Remove all ambiguity words"],"answer":0,"explain":"Contextual embeddings assign context-dependent vectors (via self-attention/positional encoding), distinguishing 'bank' (money) from 'bank' (river)."},{"topic":"W9 · Language","q":"In NLP pre-processing, dependency parsing focuses on:","options":["Phrase structure (noun/verb phrases)","Word-to-word relationships (head → dependent)","Pixel values","Reward signals"],"answer":1,"explain":"Dependency parsing focuses on word-to-word relationships (head and dependent), whereas constituency parsing focuses on phrase structure."},{"topic":"W12 · Ethics","q":"Algorithmic bias in AI most often originates from:","options":["Too little electricity","Biased or unrepresentative training data","Using too many GPUs","Fast internet"],"answer":1,"explain":"Bias typically stems from biased/unrepresentative training data, causing unfair or skewed outcomes."},{"topic":"W12 · Ethics","q":"The Microsoft 'Tay' incident is an ethics lesson about:","options":["The importance of guardrails and validation on learning systems","Hardware cost","Battery life","Screen resolution"],"answer":0,"explain":"Tay learned harmful content from users within hours, showing the need for guardrails, monitoring and validation."},{"topic":"W12 · Ethics","q":"'Explainability/transparency' in AI ethics is important so that:","options":["Models run faster","Decisions can be understood, audited and trusted","Data is deleted","Models use less memory"],"answer":1,"explain":"Explainability lets stakeholders understand, audit and trust AI decisions — key for accountability."},{"topic":"W12 · Ethics","q":"An LLM 'hallucination' is when the model:","options":["Refuses to answer","Produces confident but incorrect/fabricated output","Runs out of memory","Translates too literally"],"answer":1,"explain":"A hallucination is fabricated or inaccurate output stated confidently; human-in-the-loop and RAG/ontologies help mitigate it."},{"topic":"W12 · Ethics","q":"Which is a core privacy concern in AI systems?","options":["Using open-source code","Collecting, storing or inferring personal data without consent","Displaying charts","Running on a laptop"],"answer":1,"explain":"Privacy concerns center on collecting/using personal data (and inferring sensitive attributes) without proper consent."},{"topic":"W12 · Ethics","q":"'Accountability' in AI ethics concerns:","options":["Who is responsible when an AI system causes harm","How fast the model trains","The colour of the interface","The number of parameters"],"answer":0,"explain":"Accountability addresses responsibility and liability when AI systems make harmful or wrong decisions."},{"topic":"W12 · Ethics","q":"'Fairness' as an AI ethics principle mainly aims to ensure that systems:","options":["Run on any device","Do not systematically disadvantage particular groups","Use the newest algorithm","Have a nice UI"],"answer":1,"explain":"Fairness seeks to prevent AI from systematically disadvantaging particular individuals or groups."}];

tSel.innerHTML = '<option value="__all">All topics ('+DATA.length+')</option>' +
  topics.map(t=>'<option value="'+t+'">'+t+' ('+DATA.filter(q=>q.topic===t).length+')</option>').join('');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let state={list:[],answered:0,correct:0};

function start(){
  let pool = tSel.value==='__all'?DATA:DATA.filter(q=>q.topic===tSel.value);
  if($('#shuffleQ').checked) pool=shuffle(pool);
  const n=parseInt($('#count').value,10); if(n>0) pool=pool.slice(0,n);
  state={list:pool,answered:0,correct:0};
  $('#controls').classList.add('hide');
  $('#done').classList.add('hide');
  $('#scorebar').classList.remove('hide');
  $('#tot').textContent=pool.length; $('#ans').textContent=0; $('#cor').textContent=0; $('#pct').textContent=0; $('#bar').style.width='0%';
  render();
  window.scrollTo(0,0);
}

function render(){
  const quiz=$('#quiz'); quiz.innerHTML='';
  state.list.forEach((q,idx)=>{
    const letters=['A','B','C','D'];
    let order=[0,1,2,3];
    if($('#shuffleO').checked) order=shuffle(order);
    const card=document.createElement('div'); card.className='card';
    card.innerHTML='<div class="qtop"><span class="qnum">Q'+(idx+1)+'</span><span class="tag">'+q.topic+'</span></div>'+
      '<div class="qtext">'+q.q+'</div>'+
      '<div class="opts"></div>'+
      '<div class="exp"></div>';
    const opts=card.querySelector('.opts');
    order.forEach((origIdx,pos)=>{
      const o=document.createElement('div'); o.className='opt';
      o.innerHTML='<span class="lt">'+letters[pos]+'</span><span>'+q.options[origIdx]+'</span>';
      o.onclick=()=>choose(card,opts,origIdx,q);
      opts.appendChild(o);
    });
    quiz.appendChild(card);
  });
}

function choose(card,opts,chosen,q){
  if(card.dataset.done) return;
  card.dataset.done='1';
  const kids=[...opts.children];
  kids.forEach(k=>k.classList.add('disabled'));
  // find which visual option maps to correct/chosen by matching text
  kids.forEach(k=>{
    const txt=k.querySelector('span:last-child').textContent;
    if(txt===q.options[q.answer]) k.classList.add('correct');
  });
  const chosenText=q.options[chosen];
  const correct = chosen===q.answer;
  if(!correct){
    kids.forEach(k=>{ if(k.querySelector('span:last-child').textContent===chosenText) k.classList.add('wrong');});
  }
  const exp=card.querySelector('.exp');
  exp.innerHTML='<b>'+(correct?'✓ Correct.':'✗ Correct answer: '+q.options[q.answer])+'</b><br>'+q.explain;
  exp.classList.add('show');
  state.answered++; if(correct) state.correct++;
  $('#ans').textContent=state.answered; $('#cor').textContent=state.correct;
  const pct=Math.round(state.correct/state.answered*100); $('#pct').textContent=pct;
  $('#bar').style.width=Math.round(state.answered/state.list.length*100)+'%';
  if(state.answered===state.list.length) finish();
}

function finish(){
  const pct=Math.round(state.correct/state.list.length*100);
  $('#done').classList.remove('hide');
  $('#finalPct').textContent=pct+'%';
  let msg = pct>=80?'Excellent — you\'re exam-ready on this set.':pct>=60?'Solid. Review the ones you missed and retry.':'Keep drilling — revisit the lecture notes and try again.';
  $('#finalTxt').textContent='You scored '+state.correct+' / '+state.list.length+'. '+msg;
  $('#done').scrollIntoView({behavior:'smooth'});
}

$('#startBtn').onclick=start;
$('#retryBtn').onclick=start;
$('#reviewBtn').onclick=()=>$('#quiz').scrollIntoView({behavior:'smooth'});
</script></body></html>
